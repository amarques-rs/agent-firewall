# fly.toml app configuration file generated for agent-firewall on 2026-05-10T20:57:52-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-firewall'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  RUST_LOG = 'info'
  SLED_PATH = '/data/firewall.sled'

[[mounts]]
  source = 'firewall_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/metrics'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
